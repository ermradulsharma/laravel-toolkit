version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      laravel-updates:
        patterns:
          - "illuminate/*"
          - "laravel/*"
          - "orchestra/testbench"
    labels:
      - "security"
      - "dependencies"
    ignore:
      - dependency-name: "php"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "security"
      - "dependencies"
